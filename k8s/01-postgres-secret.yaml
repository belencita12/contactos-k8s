apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: devops-lab
type: Opaque
# Valores en base64: echo -n "valor" | base64
# contactosdb  → Y29udGFjdG9zZGI=
# postgres     → cG9zdGdyZXM=
# secretpass123 → c2VjcmV0cGFzczEyMw==
data:
  POSTGRES_DB: Y29udGFjdG9zZGI=
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: c2VjcmV0cGFzczEyMw==
