<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directorio de Contactos</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #00e5a0;
      --accent2: #00b87a;
      --danger: #ff4444;
      --danger2: #cc0000;
      --text: #f0f0f0;
      --text-muted: #777;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      margin-bottom: 48px;
      animation: fadeDown 0.5s ease;
    }
    .header-tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    header h1 {
      font-family: var(--mono);
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -1px;
    }
    header h1 span {
      color: var(--accent);
    }
    .header-sub {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 10px;
      font-weight: 300;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 12px 14px 12px 42px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,0.1);
    }
    #searchInput::placeholder { color: var(--text-muted); }

    .btn {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 1px;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }
    .btn-primary:hover {
      background: #00ff9f;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,229,160,0.3);
    }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 8px 14px;
      font-size: 11px;
    }
    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      animation: fadeUp 0.5s ease 0.15s both;
    }
    .stats-bar .count {
      color: var(--accent);
      font-weight: 700;
    }

    /* Contact list */
    #contactList {
      display: flex;
      flex-direction: column;
      gap: 2px;
      animation: fadeUp 0.5s ease 0.2s both;
    }

    .contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
      transition: all 0.2s;
      animation: fadeIn 0.3s ease;
    }
    .contact-card:hover {
      border-color: #333;
      background: var(--surface2);
      transform: translateX(4px);
    }

    .contact-avatar {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: var(--accent);
      color: #000;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .contact-details { flex: 1; }

    .contact-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .contact-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .contact-meta span {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .contact-meta .tag {
      background: rgba(0,229,160,0.08);
      color: var(--accent);
      border: 1px solid rgba(0,229,160,0.2);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: var(--mono);
      font-size: 10px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      animation: scaleIn 0.2s ease;
    }
    .modal h2 {
      font-family: var(--mono);
      font-size: 16px;
      margin-bottom: 24px;
      color: var(--accent);
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
    }
    .form-group input::placeholder { color: #444; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    .btn-cancel {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 12px;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: #555; color: var(--text); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 20px;
      font-family: var(--mono);
      font-size: 12px;
      z-index: 200;
      animation: slideUp 0.3s ease;
      max-width: 300px;
    }
    .toast.success { border-color: var(--accent); color: var(--accent); }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    .toast.hidden { display: none; }

    /* Empty / Loading states */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .state-msg .icon { font-size: 40px; margin-bottom: 12px; }
    .state-msg p { font-size: 14px; }

    /* Animations */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes scaleIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 500px) {
      .toolbar { flex-direction: column; }
      .contact-meta { gap: 8px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-tag">// devops-lab / directorio</div>
    <h1>DIRECTORIO<br/><span>CONTACTOS</span></h1>
    <p class="header-sub">Sistema de gestión · Frontend → Backend → PostgreSQL</p>
    <p class="header-sub" style="margin-top:4px;">API: <span id="apiBaseLabel">/api</span></p>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar por nombre, email o empresa..." />
    </div>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      NUEVO
    </button>
  </div>

  <div class="stats-bar">
    <span>TOTAL:</span>
    <span class="count" id="totalCount">0</span>
    <span>CONTACTOS</span>
  </div>

  <div id="contactList">
    <div class="state-msg"><div class="icon">⟳</div><p>Cargando...</p></div>
  </div>
</div>

<!-- Modal nuevo contacto -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h2>// NUEVO_CONTACTO</h2>
    <div class="form-group">
      <label>Nombre *</label>
      <input type="text" id="fNombre" placeholder="Juan Pérez" />
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="fEmail" placeholder="juan@email.com" />
    </div>
    <div class="form-group">
      <label>Teléfono</label>
      <input type="text" id="fTelefono" placeholder="+595 981 000000" />
    </div>
    <div class="form-group">
      <label>Empresa</label>
      <input type="text" id="fEmpresa" placeholder="Mi Empresa S.A." />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">CANCELAR</button>
      <button class="btn btn-primary" onclick="crearContacto()" style="flex:1;justify-content:center;">GUARDAR</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast hidden" id="toast"></div>

<script>
  const API = window.BACKEND_URL || '/api';
  let searchTimeout = null;

  function initials(name) {
    return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type}`;
    setTimeout(() => t.className = 'toast hidden', 3000);
  }

  async function cargarContactos(search='') {
    const list = document.getElementById('contactList');
    try {
      const url = search ? `${API}/contactos?search=${encodeURIComponent(search)}` : `${API}/contactos`;
      const res = await fetch(url);
      const data = await res.json();
      document.getElementById('totalCount').textContent = data.length;

      if (!data.length) {
        list.innerHTML = `<div class="state-msg"><div class="icon">◻</div><p>${search ? 'Sin resultados para "'+search+'"' : 'No hay contactos aún'}</p></div>`;
        return;
      }

      list.innerHTML = data.map(c => `
        <div class="contact-card" id="card-${c.id}">
          <div class="contact-info">
            <div class="contact-avatar">${initials(c.nombre)}</div>
            <div class="contact-details">
              <div class="contact-name">${c.nombre}</div>
              <div class="contact-meta">
                <span>✉ ${c.email}</span>
                ${c.telefono ? `<span>☏ ${c.telefono}</span>` : ''}
                ${c.empresa ? `<span class="tag">${c.empresa}</span>` : ''}
              </div>
            </div>
          </div>
          <button class="btn btn-danger" onclick="eliminarContacto(${c.id}, '${c.nombre.replace(/'/g,"\\'")}')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
            DEL
          </button>
        </div>
      `).join('');
    } catch(e) {
      list.innerHTML = `<div class="state-msg"><div class="icon">✗</div><p>Error al conectar con el backend</p></div>`;
    }
  }

  async function eliminarContacto(id, nombre) {
    if (!confirm(`¿Eliminar a "${nombre}"?`)) return;
    try {
      const res = await fetch(`${API}/contactos/${id}`, { method: 'DELETE' });
      if (res.ok) {
        const card = document.getElementById(`card-${id}`);
        card.style.transition = 'all 0.3s';
        card.style.opacity = '0';
        card.style.transform = 'translateX(-20px)';
        setTimeout(() => { cargarContactos(document.getElementById('searchInput').value); }, 300);
        showToast(`✓ "${nombre}" eliminado`);
      } else {
        showToast('Error al eliminar', 'error');
      }
    } catch(e) {
      showToast('Error de conexión', 'error');
    }
  }

  function openModal() {
    document.getElementById('modalOverlay').classList.remove('hidden');
    document.getElementById('fNombre').focus();
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.add('hidden');
    ['fNombre','fEmail','fTelefono','fEmpresa'].forEach(id => document.getElementById(id).value = '');
  }

  async function crearContacto() {
    const nombre = document.getElementById('fNombre').value.trim();
    const email = document.getElementById('fEmail').value.trim();
    const telefono = document.getElementById('fTelefono').value.trim();
    const empresa = document.getElementById('fEmpresa').value.trim();
    if (!nombre || !email) { showToast('Nombre y email requeridos', 'error'); return; }
    try {
      const res = await fetch(`${API}/contactos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, telefono, empresa })
      });
      if (res.ok) {
        closeModal();
        cargarContactos();
        showToast(`✓ Contacto "${nombre}" agregado`);
      } else {
        const err = await res.json();
        showToast(err.error || 'Error al guardar', 'error');
      }
    } catch(e) {
      showToast('Error de conexión', 'error');
    }
  }

  // Búsqueda con debounce
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => cargarContactos(e.target.value), 300);
  });

  // Cerrar modal con Escape
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.getElementById('apiBaseLabel').textContent = API;
  cargarContactos();
</script>
</body>
</html>
